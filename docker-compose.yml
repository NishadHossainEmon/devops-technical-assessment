version: "3.9"

services:
  site1:
    build: ./site1
    container_name: site1
    ports:
      - "8081:80"

  site2:
    build: ./site2
    container_name: site2
    ports:
      - "8082:80"

  nginx:
    image: nginx:latest
    container_name: reverse-proxy
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - site1
      - site2