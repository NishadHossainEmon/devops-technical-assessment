events {}

http {
    server {
        listen 80;

        location /site1/ {
            proxy_pass http://site1:80/;
        }

        location /site2/ {
            proxy_pass http://site2:80/;
        }

        location / {
            return 200 "Docker Reverse Proxy is Running!";
            add_header Content-Type text/plain;
        }
    }
}